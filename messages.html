<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESSAGES</title>
    <link rel="icon" href="DRAFTPUNK.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <script src="sentry.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Draft Punk">
</head>
<body>

    <nav class="app-nav">
        <div class="nav-dropdown">
            <button class="nav-dropdown-btn active" onclick="toggleDraftMenu()">DRAFT PUNK</button>
            <div class="nav-dropdown-menu" id="draftMenu">
                <a href="index.html" class="nav-dropdown-item">DRAFT PUNK</a>
                <a href="wordrunner.html" class="nav-dropdown-item">WORDRUNNER</a>
                <a href="groups.html" class="nav-dropdown-item">WRITING GROUPS</a>
                <a href="messages.html" class="nav-dropdown-item" style="color:var(--neon);">MESSAGES</a>
            </div>
        </div>
        <a href="write.html" class="nav-center-btn">WRITE</a>
        <div class="nav-dropdown" style="margin-left:auto;">
            <button class="nav-dropdown-btn" onclick="toggleNotesMenu()">NOTES</button>
            <div class="nav-dropdown-menu" id="notesMenu">
                <a href="beat-notes.html" class="nav-dropdown-item">BEATS</a>
                <a href="characters.html" class="nav-dropdown-item">CHARACTERS</a>
            </div>
        </div>
        <div class="nav-dropdown">
            <button class="nav-dropdown-btn" onclick="toggleDataMenu()">··· <span id="syncDot" style="display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:2px;vertical-align:middle;transition:background 0.4s;"></span></button>
            <div class="nav-dropdown-menu" id="dataMenu">
                <button class="nav-dropdown-item" id="themeToggle" onclick="toggleTheme()">LIGHT MODE</button>
                <div style="border-top:1px solid var(--border);margin:2px 0;"></div>
                <button class="nav-dropdown-item" onclick="exportData(); toggleDataMenu()">⬇ BACKUP</button>
                <button class="nav-dropdown-item" onclick="triggerImport(); toggleDataMenu()">⬆ RESTORE</button>
                <div style="border-top:1px solid var(--border);margin:2px 0;"></div>
                <button id="navSignIn" class="nav-dropdown-item" onclick="signInWithGoogle(); toggleDataMenu()" style="color:var(--neon);">⊕ SIGN IN WITH GOOGLE</button>
                <div id="navUserInfo" style="display:none;">
                    <div class="nav-dropdown-item" style="display:flex;align-items:center;gap:8px;cursor:default;">
                        <img id="navAvatar" src="" style="width:20px;height:20px;border-radius:50%;border:1px solid var(--neon);">
                        <span id="navUserName" style="color:var(--neon);font-size:0.7rem;"></span>
                    </div>
                    <button class="nav-dropdown-item" onclick="signOutUser(); toggleDataMenu()">⊖ SIGN OUT</button>
                </div>
            </div>
        </div>
    </nav>
    <input type="file" id="importFileInput" accept=".json" onchange="importData(event)" style="display:none;">

    <div class="notes-page">
        <div class="app">
            <h1>MESSAGES</h1>

            <!-- Sign-in gate -->
            <div id="messagesGate" style="text-align:center;padding:40px 0;">
                <p style="font-size:0.8rem;opacity:0.5;letter-spacing:1px;margin-bottom:20px;">SIGN IN TO USE MESSAGES</p>
                <button onclick="signInWithGoogle()" style="width:100%;max-width:300px;">⊕ SIGN IN WITH GOOGLE</button>
            </div>

            <!-- Main content -->
            <div id="messagesContent" style="display:none;">

                <!-- Compose -->
                <div style="margin-bottom:30px;">
                    <label style="font-size:0.75rem;letter-spacing:1px;opacity:0.6;">NEW MESSAGE</label>
                    <select id="composeToSelect" style="width:100%;margin-top:8px;margin-bottom:8px;"></select>
                    <textarea id="composeBody" maxlength="500" placeholder="WRITE YOUR MESSAGE..."
                        oninput="updateCharCount(this)"
                        style="width:100%;box-sizing:border-box;height:100px;resize:vertical;
                               font-family:'Courier New',monospace;font-size:0.85rem;
                               background:var(--panel);border:1px solid var(--border);
                               color:var(--text);padding:10px;letter-spacing:1px;"></textarea>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                        <span id="composeMsg" style="font-size:0.75rem;height:1.2em;letter-spacing:1px;"></span>
                        <span id="composeCharCount" style="font-size:0.65rem;opacity:0.4;letter-spacing:1px;">0 / 500</span>
                    </div>
                    <button onclick="doSendMessage()" style="width:100%;">⤴ SEND</button>
                </div>

                <!-- Inbox / Sent tabs -->
                <div>
                    <div style="display:flex;gap:4px;margin-bottom:12px;">
                        <button class="lb-period-btn msg-tab lb-period-active" data-view="inbox"  onclick="setView('inbox')">INBOX</button>
                        <button class="lb-period-btn msg-tab"                  data-view="sent"   onclick="setView('sent')">SENT</button>
                    </div>
                    <div id="messagesList"></div>
                </div>

            </div>
        </div>
    </div>

    <script src="theme.js"></script>
    <script src="backup.js"></script>
    <script src="messages.js"></script>
    <script type="module" src="sync.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
