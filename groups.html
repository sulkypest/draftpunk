<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRITING GROUPS</title>
    <link rel="icon" href="DRAFTPUNK.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <script src="sentry.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Draft Punk">
</head>
<body>

    <nav class="app-nav">
        <div class="nav-dropdown">
            <button class="nav-dropdown-btn active" onclick="toggleDraftMenu()">DRAFT PUNK</button>
            <div class="nav-dropdown-menu" id="draftMenu">
                <a href="index.html" class="nav-dropdown-item">DRAFT PUNK</a>
                <a href="wordrunner.html" class="nav-dropdown-item">WORDRUNNER</a>
                <a href="groups.html" class="nav-dropdown-item" style="color:var(--neon);">WRITING GROUPS</a>
                <a href="messages.html" class="nav-dropdown-item">MESSAGES</a>
            </div>
        </div>
        <a href="write.html" class="nav-center-btn">WRITE</a>
        <div class="nav-dropdown" style="margin-left:auto;">
            <button class="nav-dropdown-btn" onclick="toggleNotesMenu()">NOTES</button>
            <div class="nav-dropdown-menu" id="notesMenu">
                <a href="notes.html" class="nav-dropdown-item">NOTES</a>
                <a href="beat-notes.html" class="nav-dropdown-item">BEATS</a>
                <a href="characters.html" class="nav-dropdown-item">CHARACTERS</a>
            </div>
        </div>
        <div class="nav-dropdown">
            <button class="nav-dropdown-btn" onclick="toggleDataMenu()">··· <span id="syncDot" style="display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:2px;vertical-align:middle;transition:background 0.4s;"></span></button>
            <div class="nav-dropdown-menu" id="dataMenu">
                <button class="nav-dropdown-item" id="themeToggle" onclick="toggleTheme()">LIGHT MODE</button>
                <div style="border-top:1px solid var(--border);margin:2px 0;"></div>
                <button class="nav-dropdown-item" onclick="exportData(); toggleDataMenu()">⬇ BACKUP</button>
                <button class="nav-dropdown-item" onclick="triggerImport(); toggleDataMenu()">⬆ RESTORE</button>
                <div style="border-top:1px solid var(--border);margin:2px 0;"></div>
                <button id="navSignIn" class="nav-dropdown-item" onclick="signInWithGoogle(); toggleDataMenu()" style="color:var(--neon);">⊕ SIGN IN WITH GOOGLE</button>
                <div id="navUserInfo" style="display:none;">
                    <div class="nav-dropdown-item" style="display:flex;align-items:center;gap:8px;cursor:default;">
                        <img id="navAvatar" src="" style="width:20px;height:20px;border-radius:50%;border:1px solid var(--neon);">
                        <span id="navUserName" style="color:var(--neon);font-size:0.7rem;"></span>
                    </div>
                    <button class="nav-dropdown-item" onclick="signOutUser(); toggleDataMenu()">⊖ SIGN OUT</button>
                </div>
                <div style="border-top:1px solid var(--border);margin:2px 0;"></div>
                <a href="privacy.html" class="nav-dropdown-item">PRIVACY POLICY</a>
                <a href="terms.html" class="nav-dropdown-item">TERMS OF SERVICE</a>
            </div>
        </div>
    </nav>
    <input type="file" id="importFileInput" accept=".json" onchange="importData(event)" style="display:none;">

    <div class="notes-page">
        <div class="app">
            <h1>WRITING GROUPS</h1>

            <!-- Sign-in gate -->
            <div id="groupsSignInGate" style="display:none;text-align:center;padding:40px 0;">
                <p style="font-size:0.8rem;opacity:0.5;letter-spacing:1px;margin-bottom:20px;">SIGN IN TO ACCESS LEADERBOARDS AND FRIENDS</p>
                <button onclick="signInWithGoogle()" style="width:100%;max-width:300px;">⊕ SIGN IN WITH GOOGLE</button>
            </div>

            <!-- Main content (shown when signed in) -->
            <div id="groupsContent" style="display:none;">

                <!-- Pending friend requests -->
                <div id="pendingRequestsSection" style="display:none;margin-bottom:30px;">
                    <span style="font-size:0.75rem;letter-spacing:1px;opacity:0.6;">FRIEND REQUESTS</span>
                    <div id="pendingRequestsList" style="margin-top:10px;"></div>
                </div>

                <!-- Add friend -->
                <div style="margin-bottom:30px;">
                    <label for="friendUsernameInput" style="font-size:0.75rem;letter-spacing:1px;opacity:0.6;">ADD FRIEND BY USERNAME</label>
                    <div style="display:flex;gap:8px;margin-top:8px;">
                        <input type="text" id="friendUsernameInput" placeholder="USERNAME"
                            style="flex:1;text-transform:uppercase;"
                            oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9_]/g,'')"
                            onkeydown="if(event.key==='Enter') doAddFriend()">
                        <button onclick="doAddFriend()" style="white-space:nowrap;">+ ADD</button>
                    </div>
                    <p id="addFriendMsg" style="font-size:0.75rem;height:1.2em;margin-top:6px;letter-spacing:1px;"></p>
                </div>

                <!-- Friends leaderboard -->
                <div style="margin-bottom:30px;">
                    <label for="friendsSearch" style="font-size:0.75rem;letter-spacing:1px;opacity:0.6;">YOUR FRIENDS</label>
                    <input type="text" id="friendsSearch" placeholder="SEARCH FRIENDS"
                        style="width:100%;box-sizing:border-box;margin-top:8px;text-transform:uppercase;"
                        oninput="filterFriends(this.value)">
                    <div id="friendsList" style="margin-top:10px;"></div>
                </div>

                <!-- Shared with me -->
                <div style="margin-bottom:30px;">
                    <span style="font-size:0.75rem;letter-spacing:1px;opacity:0.6;">SHARED WITH ME</span>
                    <div id="sharedWithMeList" style="margin-top:10px;"></div>
                </div>

                <!-- Global leaderboard -->
                <div>
                    <span style="font-size:0.75rem;letter-spacing:1px;opacity:0.6;">GLOBAL LEADERBOARD</span>
                    <div style="display:flex;gap:4px;margin-top:8px;margin-bottom:8px;">
                        <button class="lb-period-btn lb-period-active" data-period="week"  onclick="setLeaderboardPeriod('week')" >THIS WEEK</button>
                        <button class="lb-period-btn"                  data-period="month" onclick="setLeaderboardPeriod('month')">THIS MONTH</button>
                        <button class="lb-period-btn"                  data-period="year"  onclick="setLeaderboardPeriod('year')" >THIS YEAR</button>
                        <button class="lb-period-btn"                  data-period="all"   onclick="setLeaderboardPeriod('all')"  >ALL TIME</button>
                    </div>
                    <div id="leaderboardList"></div>
                </div>

            </div>
        </div>
    </div>

    <div id="shareViewOverlay" class="overlay" style="display:none;" onclick="if(event.target===this)closeShareView()">
        <div class="congrats-box" style="max-width:600px;width:95%;max-height:80vh;display:flex;flex-direction:column;">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px;">
                <div>
                    <h2 id="shareViewTitle" style="color:var(--neon);margin:0 0 4px;"></h2>
                    <div id="shareViewMeta" style="font-size:0.65rem;opacity:0.4;letter-spacing:1px;"></div>
                </div>
                <button onclick="closeShareView()" style="background:#333;min-width:unset;width:auto;padding:4px 10px;font-size:0.7rem;white-space:nowrap;flex-shrink:0;">✕ CLOSE</button>
            </div>
            <div id="shareViewContent" style="flex:1;overflow-y:auto;margin-top:12px;font-size:0.9rem;line-height:1.8;text-align:left;border-top:1px solid var(--border);padding-top:12px;"></div>
        </div>
    </div>

    <script src="theme.js"></script>
    <script src="backup.js"></script>
    <script src="groups.js"></script>
    <script type="module" src="sync.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
