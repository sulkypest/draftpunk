<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draft Punk | Narrative HUD</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="neon-theme">

    <div id="setup" class="container">
        <h1 class="glitch">DRAFT PUNK</h1>
        <div class="setup-box">
            <input type="text" id="titleIn" placeholder="PROJECT TITLE">
            <input type="number" id="goalIn" placeholder="WORD GOAL">
            <input type="date" id="deadlineIn">
            <select id="genreIn">
                <option value="urbanFantasy">URBAN FANTASY</option>
                <option value="sciFi">SCI-FI</option>
                <option value="cyberpunk">CYBERPUNK</option>
                <option value="horror">HORROR</option>
                <option value="romance">ROMANCE</option>
            </select>
            <button class="prime-btn" onclick="start()">INITIATE LINK</button>
        </div>
    </div>

    <div id="mainDashboard" class="dashboard-layout" style="display:none;">
        <aside class="sidebar">
            <div class="rank-card">
                <label>RANK</label>
                <h2 id="sideRankName">INKSLINGER</h2>
            </div>
            <div class="stats-area">
                <div class="stat-card"><label>WIP</label><span id="wipDisplay">---</span></div>
                <div class="stat-card"><label>DAYS</label><span id="daysLeftDisplay">0</span></div>
            </div>
            <div class="side-actions">
                <button class="grenade-btn" onclick="showGrenade()">NARRATIVE GRENADE</button>
                <button class="reset-btn" onclick="resetGame()">SYSTEM RESET</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="boss-vitals">
                <h3 id="lvlName">BEAT 1: OPENING IMAGE</h3>
                <div class="boss-bar-bg">
                    <div id="bossHPBar" class="boss-bar-fill"></div>
                </div>
                <div class="target-label">TARGET: <span id="bossName">THE END</span></div>
            </div>

            <div class="visual-viewport">
                <img id="bossSprite" src="" class="boss-img">
                <div id="loreBox" class="lore-terminal"></div>
            </div>

            <div class="entry-zone">
                <div class="input-wrap">
                    <input type="number" id="wordIn" placeholder="SYNC WORDS...">
                    <button class="sync-btn" onclick="addWords()">SYNC</button>
                </div>
                <div class="progress-wrap">
                    <div class="total-bar-bg"><div id="hpBar" class="total-bar-fill"></div></div>
                    <div id="hpText" class="count-display">0 / 0</div>
                </div>
            </div>

            <div class="data-terminals">
                <div class="intel-box">
                    <label>FIELD INTEL</label>
                    <p id="tipsBox" class="tips-text"></p>
                </div>
                <div class="chart-box">
                    <canvas id="velocityChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <div id="grenadeOverlay" class="overlay" style="display:none;" onclick="closeGrenade()">
        <div class="overlay-card">
            <h2>GRENADE DETONATED</h2>
            <p id="inspireText"></p>
            <button onclick="closeGrenade()">CLOSE</button>
        </div>
    </div>

    <div id="levelOverlay" class="overlay" style="display:none;" onclick="closeOverlay()">
        <div class="overlay-card success">
            <h2>BEAT CLEARED</h2>
            <h1 id="bossBeatTitle">---</h1>
            <button onclick="closeOverlay()">PROCEED</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
