<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draft Punk</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="neon-theme">

    <div id="setup" class="container">
        <h1 class="glitch">DRAFT PUNK</h1>
        <div class="setup-box">
            <input type="text" id="titleIn" placeholder="PROJECT TITLE">
            <input type="number" id="goalIn" placeholder="WORD GOAL">
            <input type="date" id="deadlineIn">
            <select id="genreIn">
                <option value="urbanFantasy">URBAN FANTASY</option>
                <option value="sciFi">SCI-FI</option>
                <option value="cyberpunk">CYBERPUNK</option>
                <option value="horror">HORROR</option>
                <option value="romance">ROMANCE</option>
            </select>
            <button onclick="start()">INITIATE DRAFT</button>
        </div>
    </div>

    <div id="mainDashboard" class="dashboard-layout" style="display:none;">
        <aside class="sidebar">
            <div class="rank-card">
                <small>RANK</small>
                <h2 id="sideRankName">INKSLINGER</h2>
            </div>
            <div class="stats-box">
                <div class="stat-item"><label>WIP</label><span id="wipDisplay">---</span></div>
                <div class="stat-item"><label>DAYS</label><span id="daysLeftDisplay">0</span></div>
            </div>
            <button class="grenade-btn" onclick="showGrenade()">NARRATIVE GRENADE</button>
            <button class="reset-btn" onclick="resetGame()">RESET DATA</button>
        </aside>

        <main class="content-area">
            <div class="boss-vitals">
                <h3 id="lvlName">BEAT 1: OPENING IMAGE</h3>
                <div class="hp-bar-container">
                    <div id="bossHPBar" class="hp-fill"></div>
                </div>
                <div class="next-beat">TARGET: <span id="bossName">THE END</span></div>
            </div>

            <div class="boss-display">
                <img id="bossSprite" src="" class="boss-img">
                <div id="loreBox" class="lore-text"></div>
            </div>

            <div class="input-section">
                <div class="word-input-wrap">
                    <input type="number" id="wordIn" placeholder="+ ADD WORDS">
                    <button onclick="addWords()">SYNC</button>
                </div>
                <div class="total-progress">
                    <div class="progress-bg"><div id="hpBar" class="progress-fill"></div></div>
                    <div id="hpText" class="progress-text">0 / 0</div>
                </div>
            </div>

            <div class="footer-intel">
                <div class="tips-module">
                    <label>PRO-TIP</label>
                    <p id="tipsBox"></p>
                </div>
                <div class="chart-module">
                    <canvas id="velocityChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <div id="grenadeOverlay" class="overlay" style="display:none;" onclick="closeGrenade()">
        <div class="overlay-content">
            <h2>GRENADE DETONATED</h2>
            <p id="inspireText"></p>
            <button onclick="closeGrenade()">BACK TO WORK</button>
        </div>
    </div>

    <div id="levelOverlay" class="overlay" style="display:none;" onclick="closeOverlay()">
        <div class="overlay-content">
            <h2>BEAT CLEARED</h2>
            <h1 id="bossBeatTitle">---</h1>
            <button onclick="closeOverlay()">CONTINUE</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
