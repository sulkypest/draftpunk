<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DRAFT PUNK</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div id="setup">
            <h1>DRAFT PUNK</h1>
            <input type="text" id="nameIn" placeholder="Enter Name...">
            <select id="genreIn">
                <option value="urbanFantasy">Urban Fantasy</option>
                <option value="sciFi">Sci-Fi</option>
                <option value="fantasy">Fantasy</option>
                <option value="horror">Horror</option>
                <option value="thriller">Thriller</option>
            </select>
            <input type="number" id="goalIn" value="80000">
            <input type="date" id="deadlineIn">
            <button onclick="startQuest()">SYNC SYSTEM</button>
        </div>

        <div id="game" class="hidden">
            <div id="lvlName" class="level-indicator">LEVEL: OPENING IMAGE</div>
            <div id="loreText" class="lore-indicator">LOCATION: THE DUSTY CAFE</div>

            <div class="boss-hud">
                <div id="bossName" class="boss-label">BOSS: THE CATALYST</div>
                <div class="boss-hp-bg"><div id="bossHPBar" class="boss-hp-fill"></div></div>
                <div id="bossHPText" class="boss-hp-text">HP: 100%</div>
            </div>

            <div class="graph-container">
                <canvas id="velocityChart"></canvas>
            </div>

            <div class="total-progress-box">
                <div class="hp-bg"><div id="hpBar" class="hp-fill"></div></div>
                <div id="hpText" class="total-text">0 / 80,000 WORDS</div>
            </div>

            <div class="input-panel">
                <input type="number" id="wordIn" placeholder="Words to strike...">
                <button onclick="addWords()">ATTACK</button>
            </div>

            <button onclick="resetGame()" class="btn-reset">RESET CAMPAIGN</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
