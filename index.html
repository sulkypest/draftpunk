<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draft Punk | Narrative Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="setup" class="container">
        <h1>DRAFT PUNK</h1>
        <div class="form-group">
            <input type="text" id="titleIn" placeholder="Project Title">
            <input type="number" id="goalIn" placeholder="Word Count Goal (e.g. 80000)">
            <input type="date" id="deadlineIn">
            <select id="genreIn">
                <option value="urbanFantasy">Urban Fantasy</option>
                <option value="sciFi">Sci-Fi</option>
                <option value="fantasy">Epic Fantasy</option>
                <option value="horror">Horror</option>
                <option value="cyberpunk">Cyberpunk</option>
                <option value="romance">Romance</option>
            </select>
            <button onclick="start()">INITIATE DRAFT</button>
        </div>
    </div>

    <div id="mainDashboard" class="dashboard-layout" style="display:none;">
        <aside class="sidebar">
            <div class="rank-card">
                <small>CURRENT RANK</small>
                <h2 id="sideRankName">INKSLINGER</h2>
            </div>
            <div class="stat-box">
                <small>PROJECT</small>
                <div id="wipDisplay">---</div>
            </div>
            <div class="stat-box">
                <small>DAYS LEFT</small>
                <div id="daysLeftDisplay">0</div>
            </div>
            <button class="grenade-btn" onclick="showGrenade()">NARRATIVE GRENADE</button>
            <button class="reset-btn" onclick="resetGame()">WIPE DATA</button>
        </aside>

        <main class="content">
            <section class="boss-area">
                <div class="boss-header">
                    <h3 id="lvlName">BEAT 1: OPENING IMAGE</h3>
                    <div class="hp-container">
                        <div id="bossHPBar" class="hp-fill"></div>
                    </div>
                    <small>NEXT BEAT: <span id="bossName">THE END</span></small>
                </div>
                <div class="boss-visual">
                    <img id="bossSprite" src="" alt="Boss Visual">
                    <p id="loreBox" class="lore-text"></p>
                </div>
            </section>

            <section class="progress-section">
                <div class="input-area">
                    <input type="number" id="wordIn" placeholder="+ Add Words">
                    <button onclick="addWords()">LOG</button>
                </div>
                <div class="total-bar-container">
                    <div id="hpBar" class="total-fill"></div>
                    <span id="hpText">0 / 0</span>
                </div>
            </section>

            <section class="intel-area">
                <div class="tips-card">
                    <strong>PRO-TIP:</strong>
                    <p id="tipsBox"></p>
                </div>
                <div class="graph-container">
                    <canvas id="velocityChart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <div id="grenadeOverlay" class="overlay" onclick="closeGrenade()">
        <div class="overlay-content">
            <h3>GRENADE DETONATED!</h3>
            <p id="inspireText"></p>
            <button onclick="closeGrenade()">GET TO WORK</button>
        </div>
    </div>

    <div id="levelOverlay" class="overlay" onclick="closeOverlay()">
        <div class="overlay-content">
            <h2>BEAT CLEARED!</h2>
            <h1 id="bossBeatTitle">---</h1>
            <button onclick="closeOverlay()">NEXT LEVEL</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
