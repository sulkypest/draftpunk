<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAFT PUNK</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="setup" class="setup-screen">
        <h1>DRAFT PUNK</h1>
        <div class="input-group">
            <input type="text" id="titleIn" placeholder="PROJECT TITLE">
            <select id="genreIn">
                <option value="urbanFantasy">URBAN FANTASY</option>
                <option value="sciFi">SCI-FI</option>
                <option value="fantasy">HIGH FANTASY</option>
                <option value="horror">HORROR</option>
                <option value="cyberpunk">CYBERPUNK</option>
                <option value="crimeNoir">CRIME / NOIR</option>
                <option value="romance">ROMANCE</option>
                <option value="thriller">THRILLER</option>
                <option value="western">WESTERN</option>
            </select>
            <input type="number" id="goalIn" placeholder="WORD GOAL">
            <input type="date" id="deadlineIn">
            <button onclick="start()">START</button>
        </div>
    </div>

    <div id="mainDashboard" class="main-layout hidden">
        <div class="side-container">
            <div class="side-box">
                <label>PARTNER</label>
                <div class="partner-placeholder">ADS / LOGO</div>
            </div>
            <div class="side-box">
                <label>WRITING BUDDIES</label>
                <div id="buddyCountDisplay">0</div>
            </div>
        </div>

        <div class="app">
            <div class="header">
                <h1 id="wipDisplay">PROJECT</h1>
                <h2 id="lvlName">LEVEL 1</h2>
            </div>

            <div class="boss-zone">
                <img id="bossSprite" class="boss-sprite" src="bosses/1a.png">
                <div style="flex: 1; min-width: 0;">
                    <div id="bossName" style="font-size: 1.1rem; font-weight: 900; text-transform: uppercase;">BOSS</div>
                    <div class="boss-hp-container">
                        <div id="bossHPBar" class="boss-hp-fill" style="height:10px; background:red; width:100%;"></div>
                    </div>
                </div>
            </div>

            <button class="intel-btn" onclick="toggleIntel()">VIEW MICROBEAT TIPS ▾</button>
            <div id="intelContainer" class="hidden">
                <div id="loreBox" class="lore-container"></div>
                <div id="tipsBox" class="tips-container"></div>
            </div>

            <div class="chart-shield">
                <canvas id="velocityChart"></canvas>
            </div>

            <label class="bar-label">TOTAL PROGRESS</label>
            <div class="bar-container">
                <div id="hpBar" class="bar-fill"></div>
                <div id="hpText">0 / 0</div>
            </div>

            <div class="input-zone">
                <input type="number" id="wordIn" placeholder="WORDS">
                <button onclick="addWords()">ADD</button>
                <button onclick="showGrenade()" style="background:#ff4500; color:white;">GRENADE</button>
            </div>

            <div class="buddy-container" id="buddyGallery"></div>
            <button onclick="resetGame()" style="background:#333; margin-top:20px;">RESET</button>
        </div>

        <div class="side-container">
            <div class="side-box">
                <label>RANK</label>
                <div id="sideRankName">RANK</div>
            </div>
            <div class="side-box">
                <label>DEADLINE</label>
                <div id="daysLeftDisplay">--</div>
            </div>
        </div>
    </div>

    <div id="grenadeOverlay" class="overlay" onclick="closeGrenade()">
        <div class="congrats-box">
            <h2 style="color:#ff4500;">GRENADE</h2>
            <p id="inspireText"></p>
        </div>
    </div>

    <div id="buddyOverlay" class="overlay" onclick="closeBuddyOverlay()">
        <div class="congrats-box"><h2>NEW BUDDY!</h2></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
