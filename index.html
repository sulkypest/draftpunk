<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAFT PUNK</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="setup" class="setup-screen">
        <h1>DRAFT PUNK</h1>
        <div class="input-group">
            <input type="text" id="titleIn" placeholder="PROJECT TITLE">
            <select id="genreIn">
                <option value="urbanFantasy">URBAN FANTASY</option>
                <option value="sciFi">SCI-FI</option>
                <option value="fantasy">HIGH FANTASY</option>
                <option value="horror">HORROR</option>
                <option value="cyberpunk">CYBERPUNK</option>
                <option value="crimeNoir">CRIME / NOIR</option>
                <option value="romance">ROMANCE</option>
                <option value="thriller">THRILLER</option>
                <option value="western">WESTERN</option>
            </select>
            <input type="number" id="goalIn" placeholder="WORD GOAL">
            <input type="date" id="deadlineIn">
            <button onclick="start()">START</button>
        </div>
    </div>

    <div id="mainDashboard" class="main-layout hidden">
        <div class="side-container">
            <div class="side-box">
                <label>PARTNER</label>
                <div class="partner-placeholder">ADS / LOGO</div>
            </div>
            <div class="side-box">
                <label>WRITING BUDDIES</label>
                <div id="buddyCountDisplay">0</div>
                <div id="buddyCountLabel">RECRUITED</div>
            </div>
            <div class="side-box">
                <label>PARTNER</label>
                <div class="partner-placeholder">ADS / LOGO</div>
            </div>
        </div>

        <div class="app">
            <div class="header">
                <h1 id="wipDisplay">PROJECT</h1>
                <h2 id="lvlName">LEVEL 1</h2>
            </div>

            <div class="boss-zone">
                <img id="bossSprite" class="boss-sprite" src="bosses/1a.png">
                <div style="flex: 1; min-width: 0;">
                    <div style="font-size: 0.7rem; font-weight: bold; color: var(--neon);">BATTLE:</div>
                    <div id="bossName" style="font-size: 1.1rem; font-weight: 900; text-transform: uppercase;">BOSS</div>
                    <div class="boss-hp-container">
                        <div id="bossHPBar" class="boss-hp-fill"></div>
                        <div id="bossHPText">HP: 100%</div>
                    </div>
                </div>
            </div>

            <button class="intel-btn" onclick="toggleIntel()">VIEW MICROBEAT TIPS ▾</button>
            <div id="intelContainer" class="hidden">
                <div id="loreBox" class="lore-container"></div>
                <div id="tipsBox" class="tips-container"></div>
            </div>

            <div class="graph-container">
                <canvas id="velocityChart"></canvas>
            </div>

            <label class="bar-label">TOTAL PROJECT PROGRESS</label>
            <div class="bar-container total-bar">
                <div id="hpBar" class="bar-fill"></div>
                <div id="hpText">0 / 0 WORDS</div>
            </div>

            <div class="input-zone">
                <input type="number" id="wordIn" placeholder="WORDCOUNT">
                <button onclick="addWords()">ADD</button>
                <button onclick="showGrenade()" class="grenade-btn">NARRATIVE GRENADE</button>
            </div>

            <div class="collection-header">WRITING BUDDY COLLECTION</div>
            <div id="buddyGallery" class="buddy-container"></div>
            
            <button class="reset-btn" onclick="resetGame()">RESET DATA</button>
        </div>

        <div class="side-container">
            <div class="side-box">
                <label>CURRENT RANK</label>
                <img id="levelIcon" src="ranks/lvl1.png" class="lvl-icon">
                <div id="sideRankDisplay">LVL 1</div>
                <div id="sideRankName">RANK</div>
            </div>
            <div class="side-box">
                <label>DEADLINE</label>
                <div id="daysLeftDisplay">--</div>
                <div id="deadlineLabel">DAYS REMAINING</div>
            </div>
        </div>
    </div>

    <div id="grenadeOverlay" class="overlay" onclick="closeGrenade()" style="display:none;">
        <div class="congrats-box grenade-box">
            <h2 style="color: #ff4500;">NARRATIVE GRENADE</h2>
            <p id="inspireText"></p>
            <div style="font-size: 0.7rem; opacity: 0.6; margin-top: 15px;">CLICK TO DISMISS</div>
        </div>
    </div>

    <div id="levelOverlay" class="overlay" onclick="closeOverlay()" style="display:none;">
        <div class="congrats-box">
            <h3>BEAT COMPLETED!</h3>
            <div id="rankTitle" style="font-size: 1.5rem; font-weight: 900; color: var(--neon);">RANK</div>
        </div>
    </div>

    <div id="buddyOverlay" class="overlay" onclick="closeBuddyOverlay()" style="display:none;">
        <div class="congrats-box">
            <h2>NEW BUDDY RECRUITED!</h2>
            <img id="newBuddyImg" src="" style="width:80px; height:80px; margin: 15px auto; display: block;">
            <div style="font-size: 0.7rem; opacity: 0.6;">CLICK TO RECRUIT</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
