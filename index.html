<div id="game" class="hidden">
    <div id="inspirationPanel" class="glitch-panel" style="display:none;"></div>
    <div id="combatLog" class="combat-text">SYSTEM ONLINE...</div>

    <h2 id="beatName" style="color: var(--text); margin: 0;">Opening Image</h2>
    
    <div class="hp-container">
        <div id="hpBar" class="hp-bar"></div>
        <div id="hpText" class="hp-text">0 / 80,000 WORDS</div>
    </div>

    <div class="boss-ui">
        <h3 id="bossName" style="color: var(--accent); margin: 5px 0;">BOSS: THE DUSTY CAFE</h3>
        <div class="boss-hp-container">
            <div id="bossHPBar" class="boss-hp-bar"></div>
            <div id="bossHPText" class="boss-hp-text">BOSS HP: 100%</div>
        </div>
    </div>

    <div class="input-group">
        <input type="number" id="wordIn" placeholder="Enter word hit...">
        <button onclick="addWords()">ATTACK</button>
    </div>

    <div style="display: flex; justify-content: space-between; font-size: 9px; color: #555; margin-bottom: -15px; padding: 0 10px;">
        <span>VELOCITY MATRIX</span>
        <span>WHITE: TARGET | CYAN: YOU</span>
    </div>
    <div class="graph-wrapper">
        <canvas id="velocityChart"></canvas>
    </div>

    <div class="stats-row">
        <div class="stat-box">CREDITS: <span id="goldVal">0</span></div>
        <div class="stat-box">XP: <span id="xpVal">0</span></div>
    </div>

    <div class="action-grid">
        <button onclick="toggleSTC()" id="stcBtn" class="btn-alt">STREET SMARTS</button>
        <button onclick="triggerInspiration()" class="btn-inspire">NEURAL SPIKE</button>
    </div>
    
    <div id="stcAnalysis" class="hidden">
        <div id="stcList"></div>
    </div>

    <button onclick="resetGame()" class="btn-reset">SYSTEM RESET</button>
</div>
