<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAFT PUNK</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="levelOverlay" class="overlay hidden" onclick="closeOverlay()">
        <div class="congrats-box">
            <div class="glitch-wrapper">
                <h1 class="glitch" data-text="BEAT DEFEATED">BEAT DEFEATED</h1>
            </div>
            <h2 id="newLevelName">STORY BEAT</h2>
            <div class="rank-up">
                <p>RANK INCREASED TO:</p>
                <h3 id="rankTitle">LEVEL 1: WORDSMITH</h3>
            </div>
            <p class="click-advance">[ CLICK TO ACTIVATE NEXT STAGE ]</p>
        </div>
    </div>

    <div id="inspireBox" class="hidden"></div>

    <div class="main-layout">
        <div class="app">
            <div id="setup">
                <h1>DRAFT PUNK</h1>
                <div class="setup-grid">
                    <input type="text" id="titleIn" placeholder="WIP Title...">
                    <select id="genreIn">
                        <option value="urbanFantasy">Urban Fantasy</option>
                        <option value="sciFi">Sci-Fi</option>
                        <option value="fantasy">High Fantasy</option>
                        <option value="horror">Horror</option>
                        <option value="thriller">Thriller</option>
                        <option value="romance">Romance</option>
                        <option value="crime">Crime/Noir</option>
                    </select>
                    <input type="number" id="goalIn" value="80000">
                    <input type="date" id="deadlineIn">
                    <button onclick="startQuest()">INITIALIZE SYSTEM</button>
                </div>
            </div>

            <div id="game" class="hidden">
                <div class="header">
                    <div class="title-block">
                        <h1 id="wipDisplay">WIP TITLE</h1>
                        <h2 id="lvlName">OPENING IMAGE</h2>
                    </div>
                    <button onclick="getInspiration()" class="insp-btn">NARRATIVE GRENADE</button>
                </div>

                <div class="boss-zone">
                    <div id="bossSprite" class="boss-sprite"></div>
                    <div class="boss-meta">
                        <p id="bossName">You are battling the THEME STATED BEAT BOSS!</p>
                        <div class="boss-hp-container">
                            <div id="bossHPBar" class="boss-hp-fill"></div>
                            <span id="bossHPText">HP: 100%</span>
                        </div>
                    </div>
                </div>

                <div class="intel-controls">
                    <button onclick="toggleIntel()" class="intel-btn">VIEW MICROBEAT TIPS ▾</button>
                </div>
                <div id="intelContainer" class="hidden">
                    <div id="loreBox" class="lore-container"></div>
                    <div id="tipsBox" class="tips-container"></div>
                </div>

                <div class="graph-container">
                    <canvas id="velocityChart"></canvas>
                </div>

                <div class="progress-zone">
                    <div class="bar-container">
                        <div id="hpBar" class="bar-fill"></div>
                        <span id="hpText">0 / 80,000 WORDS</span>
                    </div>
                </div>

                <div class="input-zone">
                    <input type="number" id="wordIn" placeholder="Words added...">
                    <button id="attackBtn" onclick="addWords()">ATTACK</button>
                </div>
                <button onclick="resetGame()" class="reset-btn">WIPE MEMORY (RESET)</button>
            </div>
        </div>

        <div id="sidePanels" class="side-container hidden">
            <div class="side-box level-box">
                <label>WRITER LEVEL</label>
                <div id="sideRankDisplay">LEVEL 1</div>
                <h4 id="sideRankName">WORDSMITH</h4>
            </div>
            <div class="side-box dead-box">
                <label>DAYS REMAINING</label>
                <div id="daysLeftDisplay">--</div>
                <p id="deadlineLabel">TO DEADLINE</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
