<!DOCTYPE html>
<html>
<head>
    <title>DRAFT PUNK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div id="setup">
            <h1>DRAFT PUNK</h1>
            <p style="font-size:10px; color:var(--text); letter-spacing:2px;">// HARDER. BETTER. FASTER. WRITER.</p>
            <input type="text" id="nameIn" placeholder="Enter Hero Name...">
            <select id="genreIn">
                <option value="urbanFantasy">Urban Fantasy</option>
                <option value="fantasy">High Fantasy</option>
                <option value="sciFi">Science Fiction</option>
                <option value="thriller">Thriller</option>
                <option value="horror">Horror</option>
                <option value="romance">Romance</option>
                <option value="crime">Crime/Noir</option>
            </select>
            <input type="number" id="goalIn" value="80000">
            <button onclick="startQuest()">INITIALIZE SYSTEM</button>
        </div>

        <div id="game" class="hidden">
            <div id="statDisplay" style="color:gold; font-size:12px; margin-bottom:5px;">Credits: 0c</div>
            <h2 id="beatName" style="font-size:18px; margin:0; color:var(--accent);">Beat</h2>
            <div class="hp-container">
                <div id="hpBar" class="hp-bar"></div>
                <div id="hpText" class="hp-text">0/0</div>
            </div>
            <h3 id="bossName" style="font-size:14px; margin:0 0 15px 0; color:var(--text);">Milestone</h3>
            
            <input type="number" id="wordIn" placeholder="Words to log...">
            <button onclick="addWords()">SUBMIT PROGRESS</button>
            
            <button onclick="toggleSTC()" style="background:#222; font-size:10px; border:1px solid var(--text); margin-top:10px;">NEURAL LINK: ANALYSIS</button>
            <div id="stcAnalysis" class="hidden">
                <div id="stcList"></div>
            </div>
            
            <button onclick="resetGame()" style="margin-top:20px; background:none; color:#444; font-size:10px; border:none;">SYSTEM RESET</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
