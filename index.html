<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAFT PUNK | Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="levelOverlay" class="overlay hidden">
        <div class="congrats-box">
            <h1 class="glitch-text">LEVEL UP!</h1>
            <p>MAJOR BEAT REACHED</p>
            <h2 id="newLevelName">THE CATALYST</h2>
            <p class="reward">+500 CREDITS | +1000 XP</p>
        </div>
    </div>

    <div class="app">
        <div id="setup">
            <h1>DRAFT PUNK</h1>
            <p class="subtitle">// SYNC NEURAL INTERFACE</p>
            <input type="text" id="nameIn" placeholder="Hero Name...">
            <select id="genreIn">
                <option value="urbanFantasy">Urban Fantasy</option>
                <option value="fantasy">High Fantasy</option>
                <option value="sciFi">Sci-Fi</option>
                <option value="thriller">Thriller</option>
                <option value="horror">Horror</option>
                <option value="romance">Romance</option>
                <option value="crime">Crime/Noir</option>
            </select>
            <input type="number" id="goalIn" value="80000">
            <input type="date" id="deadlineIn">
            <button onclick="startQuest()">INITIALIZE SYSTEM</button>
        </div>

        <div id="game" class="hidden">
            <div id="inspirationPanel" class="glitch-panel" style="display:none;"></div>
            
            <div class="stats-mini">
                <span>XP: <b id="xpVal" style="color:var(--gold)">0</b></span>
                <span>CREDITS: <b id="goldVal" style="color:var(--neon)">0</b></span>
            </div>

            <div id="lvlName" class="level-indicator">STAGE: OPENING IMAGE</div>
            <div id="loreText" class="lore-indicator">CASE FILE: INITIALIZING...</div>

            <div class="boss-hud">
                <div class="boss-visual-container">
                    <div id="bossSprite" class="boss-sprite"></div>
                </div>
                <div id="bossName" class="boss-label">BOSS: THE CATALYST</div>
                <div class="boss-hp-bg"><div id="bossHPBar" class="boss-hp-fill"></div></div>
                <div id="bossHPText" class="boss-hp-text">HP: 100%</div>
            </div>

            <div class="graph-container">
                <canvas id="velocityChart"></canvas>
            </div>

            <div class="total-progress-box">
                <div class="hp-bg"><div id="hpBar" class="hp-fill"></div></div>
                <div id="hpText" class="total-text">0 / 80k WORDS</div>
            </div>

            <div class="input-panel">
                <input type="number" id="wordIn" placeholder="Enter word hit...">
                <button onclick="addWords()">ATTACK</button>
            </div>

            <div class="action-grid">
                <button onclick="toggleSTC()" id="stcBtn" class="btn-alt">STORY TIPS</button>
                <button onclick="triggerInspiration()" class="btn-inspire">INSPIRATION</button>
            </div>

            <div id="stcAnalysis" class="hidden">
                <div id="stcList"></div>
            </div>

            <button onclick="resetGame()" class="btn-reset">RESET CAMPAIGN</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
