<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAFT PUNK | Story Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div id="setup">
            <h1>DRAFT PUNK</h1>
            <p class="subtitle">// HARDER. BETTER. FASTER. WRITER.</p>
            <input type="text" id="nameIn" placeholder="Enter Hero Name...">
            <select id="genreIn">
                <option value="urbanFantasy">Urban Fantasy</option>
                <option value="fantasy">High Fantasy</option>
                <option value="sciFi">Science Fiction</option>
                <option value="thriller">Thriller</option>
                <option value="horror">Horror</option>
                <option value="romance">Romance</option>
                <option value="crime">Crime/Noir</option>
            </select>
            <input type="number" id="goalIn" value="80000">
            <label style="font-size: 10px; color: var(--text); display: block; margin-top: 10px;">TARGET DEADLINE:</label>
            <input type="date" id="deadlineIn">
            <button onclick="startQuest()">INITIALIZE SYSTEM</button>
        </div>

        <div id="game" class="hidden">
            <div id="inspirationPanel" class="glitch-panel" style="display:none;"></div>
            <div id="combatLog" class="combat-text">SYSTEM ONLINE...</div>

            <h2 id="beatName">Initializing...</h2>
            
            <div class="hp-container">
                <div id="hpBar" class="hp-bar"></div>
                <div id="hpText">0 / 80,000 WORDS</div>
            </div>

            <h3 id="bossName">Milestone: Deep Scan...</h3>

            <div class="input-group">
                <input type="number" id="wordIn" placeholder="Words to sync...">
                <button onclick="addWords()">LOG PROGRESS</button>
            </div>

            <div class="stats-row">
                <div class="stat-box">CREDITS: <span id="goldVal">0</span></div>
                <div class="stat-box">XP: <span id="xpVal">0</span></div>
            </div>

            <div class="graph-wrapper">
                <canvas id="velocityChart"></canvas>
            </div>

            <div class="action-grid">
                <button onclick="toggleSTC()" id="stcBtn" class="btn-alt">STORY BEAT TIPS</button>
                <button onclick="triggerInspiration()" class="btn-inspire">GET INSPIRATION</button>
            </div>
            
            <div id="stcAnalysis" class="hidden">
                <div id="stcList"></div>
            </div>

            <button onclick="resetGame()" class="btn-reset">SYSTEM RESET</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
